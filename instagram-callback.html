<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Connecting Instagram…</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #14100c;
        color: #f4ede2;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        text-align: center;
        padding: 24px;
      }
      p {
        max-width: 320px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <p id="status">Finishing Instagram sign-in… you can close this window.</p>
    <script>
      (function () {
        var params = new URLSearchParams(location.search);
        var code = params.get("code") || "";
        var error = params.get("error_description") || params.get("error") || "";
        // Hand the authorization code back to the app window that opened this popup.
        if (window.opener) {
          window.opener.postMessage(
            { type: "instagram-oauth", code: code, error: error },
            location.origin
          );
          setTimeout(function () {
            window.close();
          }, 300);
        } else if (!code) {
          document.getElementById("status").textContent =
            error || "Instagram sign-in was cancelled. You can close this window.";
        } else {
          // Opened directly (no opener) — bounce back to the app with the code.
          location.replace("/?instagram_code=" + encodeURIComponent(code));
        }
      })();
    </script>
  </body>
</html>
